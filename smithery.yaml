name: notification-ai-mcp
description: 'Notification Ai tools for AI agents. Capabilities: send webhook, send
  desktop notification, schedule notification. Built by MEOK AI Labs.'
version: 1.0.0
tools:
- name: send_webhook
  description: MEOK AI Labs tool.
  parameters:
  - name: url
    type: string
    required: true
  - name: payload
    type: string
    required: true
- name: send_desktop_notification
  description: MEOK AI Labs tool.
  parameters:
  - name: title
    type: string
    required: true
  - name: message
    type: string
    required: true
- name: schedule_notification
  description: MEOK AI Labs tool.
  parameters:
  - name: message
    type: string
    required: true
  - name: delay_seconds
    type: integer
    required: false
- name: list_notification_history
  description: MEOK AI Labs tool.
  parameters:
  - name: limit
    type: integer
    required: false
